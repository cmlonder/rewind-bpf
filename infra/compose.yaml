services:
  rewind-lab:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    image: rewindbpf/lab:stage1
    container_name: rewindbpf-lab
    working_dir: /opt/rewind
    command: ["sleep", "infinity"]
    privileged: true
    security_opt:
      - seccomp:unconfined
      - apparmor:unconfined
    # These capabilities are intentionally broad for the kernel lab. This
    # service must run only inside the disposable Ubuntu VM, never on the
    # personal macOS host or a production Linux host.
    cap_add:
      - SYS_ADMIN
      - SYS_PTRACE
      - SYS_RESOURCE
      - BPF
      - PERFMON
    network_mode: "none"
    volumes:
      - rewind-lab-work:/lab/work
      - rewind-lab-state:/lab/state
    profiles: ["kernel"]

  rewind-userspace:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    image: rewindbpf/userspace:stage1
    container_name: rewindbpf-userspace
    working_dir: /opt/rewind
    command: ["sleep", "infinity"]
    volumes:
      - rewind-lab-work:/lab/work
      - rewind-lab-state:/lab/state
    profiles: ["userspace"]

volumes:
  rewind-lab-work:
  rewind-lab-state:
