name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test ./...
      - run: go vet ./...
      - run: GOOS=darwin GOARCH=arm64 go build ./cmd/rewind
      - run: GOOS=windows GOARCH=amd64 go build ./cmd/rewind
      - run: node --check ui/app.js
      - run: node --check ui/components/layout.js
      - run: node --check ui/data/supervisor-adapter.js
